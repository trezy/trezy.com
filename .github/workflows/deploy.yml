name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sequoia publish (upsert site.standard.document records)
        run: bun run publish:atproto
        env:
          ATP_IDENTIFIER: ${{ secrets.ATP_IDENTIFIER }}
          ATP_APP_PASSWORD: ${{ secrets.ATP_APP_PASSWORD }}
          # trezy.codes lives on pds.kart.sh, not the bsky.social default, so
          # the app-password login must target the account's real PDS.
          PDS_URL: ${{ vars.PDS_URL }}

      - name: Build site
        run: bun run build
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://trezy.com' }}

      - name: Sequoia inject (add site.standard.document <link> to built HTML)
        run: bun run inject:atproto
        env:
          ATP_IDENTIFIER: ${{ secrets.ATP_IDENTIFIER }}
          ATP_APP_PASSWORD: ${{ secrets.ATP_APP_PASSWORD }}
          PDS_URL: ${{ vars.PDS_URL }}

      - name: Generate redirects
        run: bun run scripts/gen-redirects.mjs

      - name: Install wispctl
        run: npm i -g wispctl@latest

      - name: Deploy to wisp.place
        run: wispctl deploy "$WISP_HANDLE" --path dist --site "$WISP_SITE" --password "$WISP_APP_PASSWORD"
        env:
          WISP_HANDLE: ${{ vars.WISP_HANDLE }}
          WISP_SITE: ${{ vars.WISP_SITE }}
          WISP_APP_PASSWORD: ${{ secrets.WISP_APP_PASSWORD }}
